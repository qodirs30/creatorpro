    <script type="text/javascript">
      window.addEventListener('error', function(event) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.inset = '0';
        errorDiv.style.backgroundColor = '#fef2f2';
        errorDiv.style.color = '#dc2626';
        errorDiv.style.padding = '2rem';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.overflow = 'auto';
        errorDiv.innerHTML = '<h2 style="margin-top:0;">Runtime Error Terdeteksi:</h2>' +
          '<p><strong>Pesan:</strong> ' + event.message + '</p>' +
          '<p><strong>Berkas:</strong> ' + event.filename + ':' + event.lineno + ':' + event.colno + '</p>' +
          '<p><strong>Stack Trace:</strong></p><pre style="background:#f1f5f9; padding:1rem; border-radius:8px; overflow-x:auto;">' + (event.error ? event.error.stack : 'Tidak ada stack trace') + '</pre>' +
          '<p style="margin-top: 1rem; color: #475569;">Silakan salin teks di atas atau screenshot halaman ini agar saya bisa memperbaikinya.</p>';
        document.body.appendChild(errorDiv);
      });
    </script>
